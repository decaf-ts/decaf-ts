name: "CodeQL"

on:
  push:
    tags:
      - 'v?[0-9]+.[0-9]+.[0-9]+'
      - '!*-no-ci'
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '41 0 * * 4'
  workflow_dispatch:

jobs:
  analyze:
    uses: decaf-ts/reusable-actions/.github/workflows/codeql-analysis.yml@main
    secrets: inherit
